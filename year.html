<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0614">
  <title>ความทรงจำของเรา 💜</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div class="stars"></div>

  <div class="page" data-year-page>
    <div class="crumb">
      <a href="index.html">เริ่มต้น</a>
      <span class="sep">›</span>
      <span class="current" data-current-year>ปีที่ 1</span>
    </div>

    <div class="year-chips" data-year-chips></div>

    <div class="hero">
      <div class="hero-emoji">🖤💜</div>
      <h1>ครบรอบ 1 ปี</h1>
      <p class="names">Anz &amp; Melody</p>
    </div>

    <div class="moon-counter">
      <div class="moon-phase"><div class="shadow"></div></div>
      <span class="big-number" data-days>0</span>
      <p class="big-label">วันที่เรารักกันมา</p>
      <div class="sub-stats" data-sub></div>
    </div>

    <div class="card">
      <p class="card-title">🌟 ความทรงจำดีๆ ของเรา</p>
      <div data-memory></div>
      <div class="love-message" data-love-message></div>
    </div>

    <div class="card">
      <p class="card-title">📸 ช่วงเวลาสำคัญของเรา</p>
      <div class="photo-grid" data-photo-grid></div>
      <p class="folder-hint" data-folder-hint></p>
    </div>

    <div class="card quote-box">
      <div class="quote-emoji">🖤</div>
      <p class="quote-text">แตะที่คุโรมิ เพื่ออ่านข้อความเล็กๆ จากใจ</p>
    </div>

    <div class="card">
      <p class="card-title">🎯 สิ่งที่อยากทำในปีนี้</p>
      <ul class="wish-list" data-wishlist></ul>
    </div>

    <div class="card">
      <p class="card-title">💌 ฝากข้อความถึงกัน</p>
      <div class="msg-input-row">
        <input class="msg-input" type="text" placeholder="พิมพ์อะไรถึงกันสักหน่อย...">
        <button class="msg-send-btn">ส่ง</button>
      </div>
      <div class="msg-wall"></div>
    </div>

    <p class="footer-note">"ข้าน่ะก็เป็นมนุษย์ ข้ารัก ข้าเกย์ อร๊างงง 💜"</p>
  </div>

  <div class="bottom-nav">
    <a class="btn secondary icon-only" data-prev-link href="index.html">←</a>
    <a class="btn" data-next-link href="year.html?year=2">ปีที่ 2 →</a>
  </div>

  <div class="lightbox">
    <button class="lb-close">✕</button>
    <img src="" alt="">
    <div class="lb-nav">
      <button class="lb-prev">‹ ก่อนหน้า</button>
      <button class="lb-next">ถัดไป ›</button>
    </div>
  </div>

  <script src="year-data.js?v=2"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
